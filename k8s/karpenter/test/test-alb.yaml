apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-external-deployment
  namespace: default
spec:
  replicas: 3 # 외부 접속 테스트를 위해 3개로 설정
  selector:
    matchLabels:
      app: nginx-external
  template:
    metadata:
      labels:
        app: nginx-external
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-external-service
  namespace: default
spec:
  selector:
    app: nginx-external
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort # ALB 연결을 위해 NodePort 사용
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-external-ingress
  namespace: default
  annotations:
    # 핵심 설정: 인터넷 노출형 ALB 생성
    alb.ingress.kubernetes.io/scheme: internet-facing
    # 대상 그룹(Target Group) 타입을 IP로 설정 (성능 및 유연성 좋음)
    alb.ingress.kubernetes.io/target-type: ip
    # 사용할 서브넷 (퍼블릭 서브넷 레이블이 설정되어 있어야 함)
    # alb.ingress.kubernetes.io/subnets: subnet-xxxx, subnet-yyyy 
spec:
  ingressClassName: alb # AWS Load Balancer Controller가 감시할 이름
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-external-service
                port:
                  number: 80